# ============================================================================
# Headers communs pour TOUT proxy_pass vers un upstream (serveur en amont)
# ============================================================================
# Inclus dans chaque `location { ... }` qui fait du proxy_pass.
#
# Pourquoi ces 4 headers ?
#   - Host               : le backend voit le vrai domaine demandé par le
#                          client (utile pour cookies, redirects, CORS).
#   - X-Real-IP          : IP directe du client (1 seule valeur).
#   - X-Forwarded-For    : chaîne d'IPs (proxy1, proxy2, ...) standard RFC.
#                          NestJS avec `app.set('trust proxy', 'loopback')`
#                          lit ça pour connaître la vraie IP -> critique
#                          pour le rate limiter Throttler.
#   - X-Forwarded-Proto  : "https" ou "http". Permet à l'app de savoir si
#                          la requête client d'origine était HTTPS
#                          (req.secure = true dans Express).
# ============================================================================

proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# Cookie est déjà transmis par défaut, inutile de le forcer.
# proxy_pass_header Set-Cookie aussi inutile : nginx forward les headers
# de réponse par défaut.