# ============================================================================
# NGINX - Reverse Proxy HTTPS pour ft_transcendence
# ============================================================================
# Architecture :
#   Client -> nginx (443, TLS termination) -> {frontend:3000, backend:4000}
#
# Couches de sécurité :
#   - TLS 1.2+1.3, ciphers forts
#   - HSTS preload
#   - Rate limiting niveau nginx (IP) + niveau app (Throttler NestJS)
#   - Les headers HTTP (X-Frame-Options, etc.) sont gérés par Helmet
#     côté app -> pas de duplication ici.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll; # Linux : multiplexage I/O performant
    multi_accept on; # accepte plusieurs connexions d'un coup
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off; # cache la version nginx dans les erreurs/headers

    # ── Logs ─────────────────────────────────────────────────────────────
    # Format structuré avec timing (utile pour debug + monitoring).
    # `$request_time` = temps total, `$upstream_response_time` = temps backend.
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main_ext;

    # ── Performance ─────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    client_max_body_size 16M; # limite taille upload (avatars, etc.)
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    reset_timedout_connection on;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip on;
    gzip_vary on; # ajoute header Vary: Accept-Encoding
    # indispensable pour caches (CDN, proxy)
    gzip_min_length 1000;
    gzip_comp_level 6; # bon compromis cpu/ratio
    gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    image/svg+xml;

    # ── Rate limiting niveau nginx ──────────────────────────────────────
    # Complément du Throttler NestJS. Si un attaquant spamme, il prend
    # un 503 AVANT même d'arriver à Node -> protège les ressources backend.
    #
    # `$binary_remote_addr` = IP en binaire (4B IPv4, 16B IPv6), léger
    # zone=global:10m -> 10 Mo -> ~160k IPs trackées
    # rate=30r/s -> 30 requêtes/seconde max par IP (burst possible)
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

    # ── Resolver DNS ────────────────────────────────────────────────────
    # Indispensable en Docker : nginx peut résoudre dynamiquement
    # les noms de service (frontend, backend) au cas où ils redémarrent.
    # 127.0.0.11 = DNS interne Docker Compose.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ── Upstreams ───────────────────────────────────────────────────────
    # `keepalive` = pool de connexions persistantes backend -> gain latence
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }
    upstream backend {
        server backend:4000;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════════
    # HTTPS principal (port 443) — TLS 1.2+1.3, HSTS, security headers
    # Pas de bloc HTTP/80 pour 42 (le sujet impose juste HTTPS) ; ajouter
    # un redirect 301 -> https si le projet doit servir aussi en plain HTTP.
    # ═══════════════════════════════════════════════════════════════════
    server {
        # HTTP/2 activé : multiplexage de requêtes sur 1 seule connexion TCP
        # -> chargement page beaucoup plus rapide vs HTTP/1.1
        listen 443 ssl;
        http2 on; # syntaxe moderne nginx 1.25+
        server_name localhost;

        # ── SSL/TLS ─────────────────────────────────────────────────────
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;

        # TLS 1.2 minimum (TLS 1.0 et 1.1 sont cassés, deprecated)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Cipher suites fortes (Mozilla "Intermediate")
        # https://ssl-config.mozilla.org/#server=nginx&config=intermediate
        # Ordre = le serveur choisit (plus sûr que laisser le client choisir)
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # Session cache : évite de renégocier TLS à chaque requête
        # (gain perf majeur pour le 2e et N-ième chargement)
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off; # désactive les session tickets
        # (failles potentielles si clé leak)

        # ── Security headers (niveau nginx) ────────────────────────────
        # `always` = renvoyé même sur pages d'erreur 4xx/5xx
        #
        # On les pose ici (et pas dans Helmet) parce que nginx couvre
        # le frontend ET le backend. Helmet n'agit que sur /api -> sans
        # ces headers cote nginx, le frontend Next.js sortirait nu.
        #
        # HSTS : force HTTPS pour 1 an, inclus sous-domaines.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # X-Frame-Options : empeche l'embedding du site dans une iframe
        # (anti-clickjacking). DENY = aucune iframe possible, meme depuis
        # le meme site (on n'a pas de besoin legit d'iframe).
        add_header X-Frame-Options "DENY" always;

        # X-Content-Type-Options : empeche le MIME-sniffing.
        # Le browser respecte strictement le Content-Type renvoye -> reduit
        # le risque qu'un fichier upload soit interprete comme du JS/HTML.
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer-Policy : limite ce que les liens sortants envoient.
        # strict-origin-when-cross-origin = origine seule en cross-site,
        # URL complete en same-site. Standard sain.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions-Policy : successeur de Feature-Policy.
        # Desactive les APIs navigateur non utilisees -> reduit la surface XSS.
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

        # Note : Helmet cote backend continue d'emettre les memes headers
        # sur /api. Les valeurs sont alignees -> pas de conflit, juste
        # une defense en profondeur (defense in depth).

        # ── API NestJS ─────────────────────────────────────────────────
        location /api/ {
            # Rate limit : burst=20 permet 20 req d'un coup puis 30/s soutenu
            # nodelay = ne met pas en file d'attente, rejette direct avec 503
            limit_req zone=global burst=20 nodelay;

            # Strip du préfixe /api -> backend reçoit /auth/me au lieu de /api/auth/me
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            include /etc/nginx/conf.d/proxy_headers.conf;

            # Support keepalive upstream (défini dans l'upstream block)
            proxy_set_header Connection "";

            # Timeouts : backend a 30s pour répondre
            # Si ton backend peut être lent (migration Prisma au 1er boot), monte à 60s
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffers (mémoire) : améliore la perf sur gros payloads JSON
            proxy_buffering on;
            proxy_buffers 8 16k;
            proxy_buffer_size 32k;
        }

        # ── Socket.io (WebSocket upgrade) ──────────────────────────────
        location /socket.io/ {
            proxy_pass http://backend/socket.io/;
            proxy_http_version 1.1;

            # Headers WebSocket spécifiques (switch protocole HTTP -> WS)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            include /etc/nginx/conf.d/proxy_headers.conf;

            # WS = connexion longue durée : 24h de timeout
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # Pas de buffering sur WS (temps réel)
            proxy_buffering off;
        }

        # ── Frontend Next.js ───────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # HMR Next.js utilise WS en dev
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            include /etc/nginx/conf.d/proxy_headers.conf;

            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Cache statique agressif pour les assets Next.js ────────────
        # Next.js met un hash dans les noms de fichiers (/_next/static/*)
        # -> immutable 1 an = 0 latence sur rechargement
        location /_next/static/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            include /etc/nginx/conf.d/proxy_headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ── Bloquer fichiers sensibles ─────────────────────────────────
        # Defense en profondeur : meme si le frontend renverrait un 307 vers
        # /fr/Dockerfile (next-intl middleware), nginx repond 404 avant que
        # ca arrive au upstream. Pas de leak d'info sur l'arborescence.
        #
        # Les fichiers points (.env, .git, ...) sont matches par le \. initial.
        # Les autres (Dockerfile, package.json, ...) sont matches par leur nom.
        # `^~` = preference sur les autres location, `(?i)` = case-insensitive.
        location ~ /\.(env|git|htpasswd|htaccess|ssh|aws|docker|npmrc) {
            deny all;
            return 404;
        }
        location ~* ^/(Dockerfile|docker-compose\.ya?ml|compose\.ya?ml|package(-lock)?\.json|tsconfig.*\.json|nest-cli\.json|prisma/.*|Makefile|build\.mk|README\.md)$ {
            deny all;
            return 404;
        }
    }
}
